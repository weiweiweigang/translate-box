name: Deploy to GitHub Pages

on:
  push:
    branches: [master]  # 你当前的分支是 master，所以这里写 master

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4  # 升级到最新版，兼容Node.js 20
        with:
          version: 7.33.6  # 改成你本地的 pnpm 版本

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4  # 升级到v4，修复权限问题
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist